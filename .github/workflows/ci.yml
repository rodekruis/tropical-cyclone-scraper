name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Build Docker image
        run: docker build -t gdacs-events-scraper:${{ github.sha }} .

      - name: Azure Login
        if: ${{ github.ref == 'refs/heads/main' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        if: ${{ github.ref == 'refs/heads/main' && secrets.AZURE_CONTAINER_REGISTRY != '' }}
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Push image to ACR
        if: ${{ github.ref == 'refs/heads/main' && secrets.AZURE_CONTAINER_REGISTRY != '' }}
        run: |
          docker tag gdacs-events-scraper:${{ github.sha }} ${{ secrets.AZURE_CONTAINER_REGISTRY }}/gdacs-events-scraper:${{ github.sha }}
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY }}/gdacs-events-scraper:${{ github.sha }}
